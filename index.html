<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sadgyyy & Arsi</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="page">
  <!-- Фоновое видео: положите файл в папку video/ и замените src ниже. -->
  <video
    class="page__video"
    autoplay
    muted
    loop
    playsinline
    aria-hidden="true"
  >
    <source src="video/0608 (2).mp4" type="video/mp4">
  </video>

  <main class="page__content">
    <article class="card card--sadgyyy">
      <img
        class="card__avatar"
        src="images/avatar-sadgyyy.png"
        alt="Sadgyyy"
        width="140"
        height="140"
      >
      <h2 class="card__title">SAdgyyy</h2>
      <div class="card__actions">
        <a class="button" href="https://t.me/sadgyyy00">
          <img
            class="button__icon button__icon--telegram"
            src="images/icon-telegram.png"
            alt=""
            width="56"
            height="57"
          >
          <span class="button__text">Мой тг</span>
        </a>
        <a class="button" href="https://www.twitch.tv/sadgyyy">
          <img
            class="button__icon button__icon--twitch"
            src="images/icon-twitch-28b17e.png"
            alt=""
            width="45"
            height="47"
          >
          <span class="button__text">Мой твитч</span>
        </a>
      </div>
    </article>

    <article class="card card--arsi">
      <img
        class="card__avatar"
        src="images/avatar-arsi.png"
        alt="Arsi"
        width="140"
        height="140"
      >
      <h2 class="card__title">Arsi</h2>
      <div class="card__actions card__actions--single">
        <a class="button" href="https://t.me/arsi_so2">
          <img
            class="button__icon button__icon--telegram"
            src="images/icon-telegram.png"
            alt=""
            width="56"
            height="57"
          >
          <span class="button__text">Мой тг</span>
        </a>
      </div>
    </article>
  </main>
</body>
</html>
